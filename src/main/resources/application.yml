spring:
  application:
    name: MyAI-travel-reimbursement
  datasource:
    url: jdbc:mysql://localhost:3306/travel_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 100MB

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.aidemo.myaitravelreimbursement.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

server:
  port: 8080
  servlet:
    context-path: /api/v1

# 文件存储配置
storage:
  base-path: D:/myAI-tool/travel-files
  allowed-extensions: pdf,jpg,jpeg,png,heic,gif,webp

# AI 大模型配置（请替换为实际的 API Key）
ai:
  base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
  api-key: ${AI_API_KEY:your-api-key-here}
  model: qwen-vl-max
  timeout: 60

# Knife4j 配置
knife4j:
  enable: true
  production: false
  setting:
    language: zh_cn

# 日志配置
logging:
  level:
    com.aidemo.myaitravelreimbursement: debug
