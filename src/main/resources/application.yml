spring:
  application:
    name: MyAI-travel-reimbursement
  datasource:
    url: jdbc:mysql://travel-mysql:3306/travel_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
#    url: jdbc:mysql://localhost:3306/travel_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 100MB

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.aidemo.myaitravelreimbursement.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

server:
  port: 8080
  servlet:
    context-path: /api/v1

# CORS 配置
cors:
  allowed-origins: http://localhost:*,http://127.0.0.1:*,http://8.134.36.221:*,http://*.aibillservice.help

# JWT 配置
jwt:
  secret: ${JWT_SECRET:}
  expiration: 43200000  # 12小时（毫秒）

# 前端访问地址（用于 AI 返回完整下载链接）
app:
  base-url: http://8.134.36.221/api/v1
#  base-url: http://localhost/api/v1

# 文件存储配置
storage:
  base-path: /opt/travel-reimbursement/travel-files
#  base-path: D:/myAI-tool/travel-files
  allowed-extensions: pdf,jpg,jpeg,png,heic,gif,webp

# AI 大模型配置
ai:
  provider: langchain4j
  #okhttp
  #Kimi
#  provider: langchain4j
  base-url: ${AI_BASE_URL:https://api.moonshot.cn/v1}
  api-key: ${AI_API_KEY:}
  model: ${AI_MODEL:kimi-k2.5}

  #      智谱
#  base-url: https://open.bigmodel.cn/api/paas/v4/
#  api-key: b6e0db2a29744042a2de425928fb3f69.nzDgy81VBASU7BVV
#  model: glm-5.1
  timeout: 120
  temperature: 1.0
  max-retries: 3

# Excel MCP 工具配置（用于 AI 操作 Excel 文件）
# MCP 服务器需以 streamable-http 方式启动：
#   EXCEL_FILES_PATH=/path/to/files FASTMCP_PORT=8017 uvx excel-mcp-server streamable-http --host 0.0.0.0
excel-mcp:
#  url: http://localhost:8017/mcp
  url: http://excel-mcp:8017/mcp

# Knife4j 配置
knife4j:
  enable: true
  production: false
  setting:
    language: zh_cn

# RAG 文档配置
rag:
  docs-path: /opt/travel-reimbursement/docs
#  docs-path: D:/myAI-tool/docs
#  chroma:
#    # ChromaDB 服务地址（需启动：docker run -p 8000:8000 chromadb/chroma）
#    # 当前使用 InMemoryEmbeddingStore，此配置暂时无效，保留以便将来切换回 ChromaDB
#    base-url: ${CHROMA_BASE_URL:http://localhost:8000}
#    collection-prefix: travel-
  chunking:
    max-chunk-size: 2000
    overlap: 200
  search:
    max-results: 5
    min-score: 0.6
    dense-weight: 0.6
    sparse-weight: 0.4
    rrf-k: 60

# 日志配置
logging:
  level:
    com.aidemo.myaitravelreimbursement: debug

  pattern:
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr(${LOG_LEVEL_PATTERN:-%5p}) %clr(${PID:- }){magenta} %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n"
